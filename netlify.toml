[build]
  command = "npm run build"
  publish = "dist"

# Never cache the service worker or the HTML shell, so new deploys are picked up.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
